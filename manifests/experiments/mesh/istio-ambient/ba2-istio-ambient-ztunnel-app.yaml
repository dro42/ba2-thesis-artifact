apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ba2-istio-ambient-ztunnel
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/name: ba2-istio-ambient-ztunnel
    service-mesh: istio-ambient
    thesis-component: experiment-control
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ba2

  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: ztunnel
    targetRevision: 1.29.1
    helm:
      releaseName: istio-ambient-ztunnel
      values: |
        profile: ambient

        global:
          istioNamespace: istio-system

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "15020"
          prometheus.io/path: "/metrics"

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
