apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ba2-istio-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/name: ba2-istio-gateway
    service-mesh: istio-sidecar
    thesis-component: experiment-control
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ba2

  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.28.5
    helm:
      releaseName: istio-gateway
      values: |
        labels:
          app: istio-gateway
          istio: gateway

        service:
          type: ClusterIP
          ports:
            - name: http2
              port: 80
              protocol: TCP
              targetPort: 80
            - name: https
              port: 443
              protocol: TCP
              targetPort: 443

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        autoscaling:
          enabled: false

        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "15020"
          prometheus.io/path: "/stats/prometheus"

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
