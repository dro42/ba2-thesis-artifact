apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ba2-istio-telemetry
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/name: ba2-istio-telemetry
    service-mesh: istio-sidecar
    thesis-component: experiment-control
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ba2

  source:
    repoURL: https://github.com/dro42/ba2-thesis-artifact.git
    targetRevision: main
    path: manifests/istio-telemetry

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
