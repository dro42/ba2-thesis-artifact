apiVersion: v1
kind: ServiceAccount
metadata:
  name: ba2-rollouts-preflight
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/component: rollouts-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-13"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ba2-rollouts-preflight
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/component: rollouts-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-12"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ba2-rollouts-preflight
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/component: rollouts-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-11"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
subjects:
  - kind: ServiceAccount
    name: ba2-rollouts-preflight
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ba2-rollouts-preflight
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ba2-rollouts-preflight
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ba2-experiment
    app.kubernetes.io/component: rollouts-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ba2-experiment
        app.kubernetes.io/component: rollouts-preflight
    spec:
      serviceAccountName: ba2-rollouts-preflight
      restartPolicy: Never
      containers:
        - name: validate-rollouts
          image: cgr.dev/chainguard/kubectl:latest-dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -ec
          args:
            - |
              echo "Checking Argo Rollouts CRD..."
              kubectl get crd rollouts.argoproj.io >/dev/null

              echo "Checking Argo Rollouts controller deployment..."
              controller_name="$(kubectl -n argo-rollouts get deployments \
                -l app.kubernetes.io/name=argo-rollouts,app.kubernetes.io/component=rollouts-controller \
                -o jsonpath='{.items[0].metadata.name}')"

              if [ -z "${controller_name}" ]; then
                echo "Argo Rollouts controller deployment not found in namespace argo-rollouts."
                exit 1
              fi

              kubectl -n argo-rollouts wait deployment "${controller_name}" \
                --for=condition=Available=True \
                --timeout=120s

              echo "Argo Rollouts preflight checks passed."
