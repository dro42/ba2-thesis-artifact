# Gateway API HTTPRoutes for podinfo external access (sidecar mode)
# These attach to the podinfo-gateway and route external traffic to backend services
---
# Stable version direct access
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-stable-route
  namespace: podinfo
spec:
  parentRefs:
  - name: podinfo-public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: istio-system
  hostnames:
  - stable-podinfo-istio-rollouts.drozd.cloud
  - stable-podinfo-istio-rollouts.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: podinfo-stable
      group: ""
      kind: Service
      port: 80
      weight: 1
---
# Canary version direct access
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-canary-route
  namespace: podinfo
spec:
  parentRefs:
  - name: podinfo-public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: istio-system
  hostnames:
  - canary-podinfo-istio-rollouts.drozd.cloud
  - canary-podinfo-istio-rollouts.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: podinfo-canary
      group: ""
      kind: Service
      port: 80
      weight: 1
---
# Traffic-split access (uses root podinfo service, Argo Rollouts manages Istio split)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-split-route
  namespace: podinfo
spec:
  parentRefs:
  - name: podinfo-public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: istio-system
  hostnames:
  - podinfo-istio-rollouts.drozd.cloud
  - podinfo-istio-rollouts.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: podinfo
      group: ""
      kind: Service
      port: 80
      weight: 1
