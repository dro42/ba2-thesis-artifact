# Root service - routes to all podinfo pods
# Used as HTTPRoute parentRef for traffic splitting via waypoint
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: podinfo-ambient
  labels:
    app: podinfo
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 9898
    protocol: TCP
    name: http
  - port: 9797
    targetPort: 9797
    protocol: TCP
    name: http-metrics
  - port: 9999
    targetPort: 9999
    protocol: TCP
    name: grpc
  selector:
    app: podinfo
---
# Stable service - Argo Rollouts patches the selector with rollouts-pod-template-hash
# Referenced as backendRef in HTTPRoute
apiVersion: v1
kind: Service
metadata:
  name: podinfo-stable
  namespace: podinfo-ambient
  labels:
    app: podinfo
    role: stable
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 9898
    protocol: TCP
    name: http
  - port: 9797
    targetPort: 9797
    protocol: TCP
    name: http-metrics
  - port: 9999
    targetPort: 9999
    protocol: TCP
    name: grpc
  selector:
    app: podinfo
---
# Canary service - Argo Rollouts patches the selector with rollouts-pod-template-hash
# Referenced as backendRef in HTTPRoute
apiVersion: v1
kind: Service
metadata:
  name: podinfo-canary
  namespace: podinfo-ambient
  labels:
    app: podinfo
    role: canary
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 9898
    protocol: TCP
    name: http
  - port: 9797
    targetPort: 9797
    protocol: TCP
    name: http-metrics
  - port: 9999
    targetPort: 9999
    protocol: TCP
    name: grpc
  selector:
    app: podinfo
