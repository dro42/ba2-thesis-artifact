# ServiceAccount for failover workflows
# Used by Argo Workflows to promote Rollouts and query cluster state
apiVersion: v1
kind: ServiceAccount
metadata:
  name: podinfo-failover-sa
  namespace: argo-events
---
# ClusterRole granting permission to promote Rollouts and read services
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: podinfo-failover
rules:
- apiGroups: ["argoproj.io"]
  resources: ["rollouts", "rollouts/status"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: ["argoproj.io"]
  resources: ["analysisruns"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
# Namespace label management: enroll/unenroll argo-events in ambient mesh during experiments
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "patch"]
# For chaos-experiment: fault injection and cleanup via K8s API
- apiGroups: ["networking.istio.io"]
  resources: ["virtualservices"]
  verbs: ["get", "patch"]
# For ambient mode: read/patch HTTPRoutes (Gateway API)
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get", "list", "patch"]
# For timing report: list failover workflows
# For sensor-triggered failover: create workflows
- apiGroups: ["argoproj.io"]
  resources: ["workflows"]
  verbs: ["get", "list", "create"]
# For sensor: read WorkflowTemplates referenced via workflowTemplateRef
- apiGroups: ["argoproj.io"]
  resources: ["workflowtemplates"]
  verbs: ["get", "list"]
# Required by Argo Workflows to report task results between steps
- apiGroups: ["argoproj.io"]
  resources: ["workflowtaskresults"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: podinfo-failover
subjects:
- kind: ServiceAccount
  name: podinfo-failover-sa
  namespace: argo-events
# The Argo Events sensor pod runs as the default SA and needs
# permission to create workflows when triggering failover actions.
- kind: ServiceAccount
  name: default
  namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: podinfo-failover
