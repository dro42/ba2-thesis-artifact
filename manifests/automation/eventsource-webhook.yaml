# Webhook EventSource receives Alertmanager alerts for stable health degradation
# Alertmanager sends HTTP POST to this endpoint when stable error rate exceeds threshold
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: webhook
  namespace: argo-events
spec:
  service:
    ports:
    - port: 12000
      targetPort: 12000
  webhook:
    # Endpoint for podinfo stable health alerts (sidecar mode)
    podinfo-stable-health:
      port: "12000"
      endpoint: /podinfo-stable-health
      method: POST
    # Endpoint for podinfo stable health alerts (ambient mode)
    podinfo-ambient-stable-health:
      port: "12000"
      endpoint: /podinfo-ambient-stable-health
      method: POST
