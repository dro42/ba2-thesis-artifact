apiVersion: v1
kind: ConfigMap
metadata:
  name: ba2-experiment-ops-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "BA2"
data:
  ba2-experiment-ops.json: |
    {
      "annotations": {"list": [{"builtIn": 1, "datasource": "-- Grafana --", "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}, {"datasource": "Prometheus", "enable": true, "expr": "ALERTS{alertname=~\"PodInfoStable.*|PodInfoAmbient.*\", alertstate=\"firing\"}", "hide": false, "iconColor": "red", "name": "Canary Failover Alerts", "step": "30s", "tagKeys": "alertname,mesh_mode", "titleFormat": "{{alertname}} ({{mesh_mode}})", "type": "tags"}]},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {"datasource": null, "gridPos": {"h": 4, "w": 24, "x": 0, "y": 0}, "id": 100, "options": {"content": "# BA2 Experiment Operations\nThis dashboard follows the experiment control path instead of the mesh dataplane only: Argo Rollouts controller health, rollout reconciliation, and the Argo control namespaces (`argo-rollouts`, `argo-events`, `argo-workflows`) with live logs for failures.", "mode": "markdown"}, "transparent": true, "type": "text"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 0, "y": 4}, "id": 1, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"argo-rollouts\",condition=\"true\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Argo Rollouts Ready Pods", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 6, "y": 4}, "id": 2, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"argo-events\",condition=\"true\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Argo Events Ready Pods", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 12, "y": 4}, "id": 3, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"argo-workflows\",condition=\"true\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Argo Workflows Ready Pods", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 3, "unit": "ops"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 18, "y": 4}, "id": 4, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(rollout_reconcile_error{job=\"argo-rollouts-metrics\"}[$__rate_interval])) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Rollout Reconcile Errors/sec", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}, "id": 5, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "histogram_quantile(0.95, sum by (le) (rate(rollout_reconcile_bucket{job=\"argo-rollouts-metrics\"}[$__rate_interval])))", "legendFormat": "rollouts controller", "refId": "A"}], "title": "Rollout Reconcile P95", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}, "id": 6, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum by (namespace) (increase(kube_pod_container_status_restarts_total{namespace=~\"argo-rollouts|argo-events|argo-workflows\"}[$__rate_interval]))", "legendFormat": "{{namespace}}", "refId": "A"}], "title": "Container Restarts by Argo Namespace", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}, "id": 7, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum by (reason) (rate(rollout_events_total{job=\"argo-rollouts-metrics\"}[$__rate_interval]))", "legendFormat": "{{reason}}", "refId": "A"}], "title": "Rollout Events by Reason", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}, "id": 8, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum by (namespace, phase) (kube_pod_status_phase{namespace=~\"argo-rollouts|argo-events|argo-workflows\",phase=~\"Pending|Running|Failed\"})", "legendFormat": "{{namespace}} {{phase}}", "refId": "A"}], "title": "Argo Namespace Pod Phases", "type": "timeseries"},
        {"datasource": "Loki", "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}}, "gridPos": {"h": 10, "w": 8, "x": 0, "y": 24}, "id": 9, "options": {"showTime": true, "showLabels": true, "sortOrder": "Descending", "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none"}, "targets": [{"expr": "{namespace=\"argo-rollouts\"} |~ \"(?i)(error|failed|abort|degraded)\"", "refId": "A"}], "title": "Argo Rollouts Error Logs", "type": "logs"},
        {"datasource": "Loki", "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}}, "gridPos": {"h": 10, "w": 8, "x": 8, "y": 24}, "id": 10, "options": {"showTime": true, "showLabels": true, "sortOrder": "Descending", "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none"}, "targets": [{"expr": "{namespace=\"argo-events\"} |~ \"(?i)(error|failed|warning|webhook)\"", "refId": "A"}], "title": "Argo Events Logs", "type": "logs"},
        {"datasource": "Loki", "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}}, "gridPos": {"h": 10, "w": 8, "x": 16, "y": 24}, "id": 11, "options": {"showTime": true, "showLabels": true, "sortOrder": "Descending", "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none"}, "targets": [{"expr": "{namespace=\"argo-workflows\"} |~ \"(?i)(error|failed|warning)\"", "refId": "A"}], "title": "Argo Workflows Logs", "type": "logs"}
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "tags": ["ba2", "argo", "rollouts", "events", "workflows", "experiments"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "BA2 - Experiment Operations",
      "uid": "ba2-experiment-ops",
      "version": 1
    }