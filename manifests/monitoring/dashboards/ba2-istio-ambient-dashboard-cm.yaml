        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 16, "y": 15}, "id": 12, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "(1000 * histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "A"}], "title": "Raw App P95 Including Probes", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 0, "y": 23}, "id": 13, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "A"}], "title": "Raw Mesh Request Rate Including Passthrough", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 8, "y": 23}, "id": 14, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "(histogram_quantile(0.95, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "A"}], "title": "Raw Mesh P95 Including Passthrough", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 3, "unit": "cores"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 16, "y": 23}, "id": 15, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"istio-system\",pod=~\"ztunnel-.*\",container=\"istio-proxy\"}[$__rate_interval])) by (pod)", "legendFormat": "Istio ambient {{pod}}", "refId": "A"}], "title": "ztunnel CPU", "type": "timeseries"},
