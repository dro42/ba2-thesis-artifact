        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 16, "y": 7}, "id": 9, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\",destination_service_name!=\"PassthroughCluster\",destination_service!~\".*alloy.*\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient strict", "refId": "A"}], "title": "Mesh Request Rate Excluding Passthrough", "type": "timeseries"},
