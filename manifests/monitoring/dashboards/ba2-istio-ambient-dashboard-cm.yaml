        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 3, "unit": "cores"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 39}, "id": 19, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"podinfo-ambient\",pod=~\".*waypoint.*\"}[$__rate_interval])) by (pod)", "legendFormat": "{{pod}}", "refId": "A"}], "title": "Waypoint CPU", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "MiB"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 39}, "id": 20, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace=\"podinfo-ambient\",pod=~\".*waypoint.*\"}) by (pod) / 1024 / 1024", "legendFormat": "{{pod}}", "refId": "A"}], "title": "Waypoint Memory", "type": "timeseries"}
