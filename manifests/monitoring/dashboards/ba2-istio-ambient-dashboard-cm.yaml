      "annotations": {"list": [{"builtIn": 1, "datasource": "-- Grafana --", "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {"datasource": null, "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0}, "id": 100, "options": {"content": "# Istio Ambient Mode\nThis dashboard is strict about the `podinfo-ambient` namespace. Metrics labeled `Istio ambient` belong to the ambient deployment only. Metrics labeled `Shared control plane` come from `istio-system` and can appear in multiple dashboards because the control plane is shared.", "mode": "markdown"}, "transparent": true, "type": "text"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 0, "y": 3}, "id": 1, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(http_request_duration_seconds_count{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\",path!~\"healthz|readyz\"}[$__rate_interval])) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Ambient Business RPS", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 4, "y": 3}, "id": 2, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "(1000 * histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\",path!~\"healthz|readyz\"}[$__rate_interval])))) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Ambient Business P95", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 8, "y": 3}, "id": 3, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\",destination_service_name!=\"PassthroughCluster\",destination_service!~\".*alloy.*\"}[$__rate_interval])) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Ambient Mesh RPS", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 12, "y": 3}, "id": 4, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"istio-system\",condition=\"true\",pod=~\"ztunnel-.*\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Ambient ztunnel Ready", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 16, "y": 3}, "id": 5, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"podinfo-ambient\",condition=\"true\",pod=~\".*waypoint.*\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Ambient Waypoints", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 20, "y": 3}, "id": 6, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"istio-system\",condition=\"true\",pod=~\"istiod-.*\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Shared Istiod Ready", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 0, "y": 7}, "id": 7, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(http_request_duration_seconds_count{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\",path!~\"healthz|readyz\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient business", "refId": "A"}], "title": "Business Request Rate", "type": "timeseries"},
