# Service Mesh Profiling Dashboard (Pyroscope)
# Compares CPU/memory profiles across Istio sidecar vs ambient, stable vs canary.
# Fixes F5: separates stable and canary profiles per mesh mode.

apiVersion: v1
kind: ConfigMap
metadata:
  name: ba2-service-mesh-profiles-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "BA2"
data:
  service-mesh-profiles.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": null,
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "options": {
            "content": "# Podinfo Profiling\nCPU and memory profiles split by mesh mode and deployment track. Labels come from `PYROSCOPE_TAGS` (`service_mesh`, `track`) injected by each overlay. If a panel is empty, the corresponding overlay is not active or Pyroscope hasn't received profiles yet.",
            "mode": "markdown"
          },
          "transparent": true,
          "type": "text"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 3 },
          "id": 1,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "process_cpu:cpu:nanoseconds:cpu:nanoseconds",
              "query": "{service_name=\"podinfo\",service_mesh=\"istio\",track=\"stable\"}"
            }
          ],
          "title": "Istio Sidecar CPU - Stable",
          "type": "flamegraph"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 3 },
          "id": 2,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "process_cpu:cpu:nanoseconds:cpu:nanoseconds",
              "query": "{service_name=\"podinfo\",service_mesh=\"istio\",track=\"canary\"}"
            }
          ],
          "title": "Istio Sidecar CPU - Canary",
          "type": "flamegraph"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 13 },
          "id": 3,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "process_cpu:cpu:nanoseconds:cpu:nanoseconds",
              "query": "{service_name=\"podinfo\",service_mesh=\"istio-ambient\",track=\"stable\"}"
            }
          ],
          "title": "Istio Ambient CPU - Stable",
          "type": "flamegraph"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 13 },
          "id": 4,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "process_cpu:cpu:nanoseconds:cpu:nanoseconds",
              "query": "{service_name=\"podinfo\",service_mesh=\"istio-ambient\",track=\"canary\"}"
            }
          ],
          "title": "Istio Ambient CPU - Canary",
          "type": "flamegraph"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 23 },
          "id": 5,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "process_cpu:cpu:nanoseconds:cpu:nanoseconds",
              "query": "{service_name=\"podinfo\",delivery=\"argo-rollouts\"}"
            }
          ],
          "title": "Podinfo CPU - Rollout Runs",
          "type": "flamegraph"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 23 },
          "id": 6,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "memory:alloc_space:bytes:space:bytes",
              "query": "{service_name=\"podinfo\",track=\"stable\"}"
            }
          ],
          "title": "Memory Allocation - Stable",
          "type": "flamegraph"
        },
        {
          "datasource": "Pyroscope",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 33 },
          "id": 7,
          "targets": [
            {
              "refId": "A",
              "profileTypeId": "memory:alloc_space:bytes:space:bytes",
              "query": "{service_name=\"podinfo\",track=\"canary\"}"
            }
          ],
          "title": "Memory Allocation - Canary",
          "type": "flamegraph"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["pyroscope", "profiles", "service-mesh", "thesis"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {
        "refresh_intervals": ["10s", "30s", "1m", "5m"],
        "time_options": ["15m", "1h", "6h", "12h", "24h"]
      },
      "timezone": "",
      "title": "Service Mesh Profiles (Pyroscope)",
      "uid": "service-mesh-profiles",
      "version": 3
    }
