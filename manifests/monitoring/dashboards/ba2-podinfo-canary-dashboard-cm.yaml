# BA2 Podinfo canary and rollout dashboard

apiVersion: v1
kind: ConfigMap
metadata:
  name: ba2-podinfo-canary-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "BA2"
data:
  ba2-podinfo-canary.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": "Prometheus",
            "enable": true,
            "expr": "ALERTS{alertname=~\"PodInfoStable.*|PodInfoAmbient.*\", alertstate=\"firing\"}",
            "hide": false,
            "iconColor": "red",
            "name": "Canary Failover Alerts",
            "step": "30s",
            "tagKeys": "alertname,mesh_mode",
            "titleFormat": "{{alertname}} ({{mesh_mode}})",
            "type": "tags"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rollout_info_replicas_desired{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}) or on() vector(0)",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Rollout Desired Replicas",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rollout_info_replicas_updated{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}) or on() vector(0)",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Rollout Updated Replicas",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rollout_info_replicas_available{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}) or on() vector(0)",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Rollout Available Replicas",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rollout_info_replicas_unavailable{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}) or on() vector(0)",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Rollout Unavailable Replicas",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 4 },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (phase) (rollout_phase{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"})",
              "legendFormat": "{{phase}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Rollout Phase",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 4 },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (reason) (rate(rollout_events_total{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}[$__rate_interval]))",
              "legendFormat": "{{reason}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Rollout Events by Reason",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 3,
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 4 },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(rollout_reconcile_bucket{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}[$__rate_interval])))",
              "legendFormat": "p95 reconcile",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Rollout Reconcile P95",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 3,
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 4 },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(rollout_reconcile_error{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}[$__rate_interval]))",
              "legendFormat": "reconcile errors",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Rollout Reconcile Errors",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 12 },
          "id": 9,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "100 * sum(rollout_info_replicas_updated{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}) / clamp_min(sum(rollout_info_replicas_desired{job=\"argo-rollouts-metrics\",exported_namespace=\"$namespace\",name=\"podinfo\"}), 0.001)",
              "legendFormat": "updated share",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Updated Replica Share",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 12 },
          "id": 10,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (owner_name) (max by (namespace, pod) (kube_pod_status_ready{namespace=\"$namespace\",condition=\"true\",pod=~\"podinfo.*\"}) * on(namespace, pod) group_left(owner_name) max by (namespace, pod, owner_name) (kube_pod_owner{namespace=\"$namespace\",owner_kind=\"ReplicaSet\",pod=~\"podinfo.*\"}))",
              "legendFormat": "{{owner_name}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Ready Pods by ReplicaSet",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 12 },
          "id": 11,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(http_requests_total{app=\"podinfo\",namespace=\"$namespace\",job=~\"prometheus.scrape.pods|podinfo/.+\"}[$__rate_interval])) or sum by (pod) (rate(istio_requests_total{reporter=\"destination\",destination_workload_namespace=\"$namespace\",destination_app=\"podinfo\"}[$__rate_interval]))",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "App Requests by Pod",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 12 },
          "id": 12,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "(1000 * histogram_quantile(0.95, sum by (le, pod) (rate(http_request_duration_seconds_bucket{app=\"podinfo\",namespace=\"$namespace\",job=~\"prometheus.scrape.pods|podinfo/.+\"}[$__rate_interval])))) or histogram_quantile(0.95, sum by (le, pod) (rate(istio_request_duration_milliseconds_bucket{reporter=\"destination\",destination_workload_namespace=\"$namespace\",destination_app=\"podinfo\"}[$__rate_interval])))",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "App P95 by Pod",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 20 },
          "id": 13,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "max by (pod) (kube_pod_status_ready{namespace=\"$namespace\",condition=\"true\",pod=~\"podinfo.*\"})",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Ready Pods by Pod",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 20 },
          "id": 14,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "max by (pod) (kube_pod_container_status_restarts_total{namespace=\"$namespace\",pod=~\"podinfo.*\"})",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Container Restarts",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 3,
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 20 },
          "id": 15,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",pod=~\"podinfo.*\",container=\"podinfo\"}[$__rate_interval])) by (pod)",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Pod CPU",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "MiB"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 20 },
          "id": 16,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\",pod=~\"podinfo.*\",container=\"podinfo\"}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Pod Memory Working Set",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "tags": ["ba2", "podinfo", "canary", "rollout", "istio", "argo-rollouts"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "podinfo",
              "value": "podinfo"
            },
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "options": [
              { "selected": true, "text": "podinfo", "value": "podinfo" },
              { "selected": false, "text": "podinfo-ambient", "value": "podinfo-ambient" }
            ],
            "query": "podinfo,podinfo-ambient",
            "type": "custom"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "BA2 - Podinfo Canary & Rollout",
      "uid": "ba2-podinfo-canary",
      "version": 3
    }
