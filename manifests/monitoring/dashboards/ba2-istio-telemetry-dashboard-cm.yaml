# BA2 Istio overview dashboard

apiVersion: v1
kind: ConfigMap
metadata:
  name: ba2-istio-telemetry-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "BA2"
data:
  ba2-istio-telemetry.json: |
    {
      "annotations": {"list": [{"builtIn": 1, "datasource": "-- Grafana --", "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {"datasource": null, "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0}, "id": 100, "options": {"content": "# Istio Telemetry Overview\nStrict panels compare `Istio sidecar` and `Istio ambient` and intentionally exclude probe-only app traffic and passthrough mesh traffic. Raw fallback panels keep the dashboard readable during single-mesh runs when only probes or collector traffic are visible.", "mode": "markdown"}, "transparent": true, "type": "text"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 0, "y": 3}, "id": 1, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(http_request_duration_seconds_count{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo\",path!~\"healthz|readyz\"}[$__rate_interval])) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Sidecar Business RPS", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 4, "y": 3}, "id": 2, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(http_request_duration_seconds_count{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\",path!~\"healthz|readyz\"}[$__rate_interval])) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istio Ambient Business RPS", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 8, "y": 3}, "id": 3, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"istio-system\",condition=\"true\",pod=~\"istiod-.*\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Istiod Ready Pods", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 12, "y": 3}, "id": 4, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "count(kube_pod_container_info{namespace=\"podinfo\",container=\"istio-proxy\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Sidecar Proxies", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 16, "y": 3}, "id": 5, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"istio-system\",condition=\"true\",pod=~\"ztunnel-.*\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "ztunnel Ready Pods", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "none"}, "overrides": []}, "gridPos": {"h": 4, "w": 4, "x": 20, "y": 3}, "id": 6, "options": {"colorMode": "value", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"podinfo-ambient\",condition=\"true\",pod=~\".*waypoint.*\"}) or on() vector(0)", "instant": true, "range": false, "refId": "A"}], "title": "Ambient Waypoints", "type": "stat"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 0, "y": 7}, "id": 7, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(http_request_duration_seconds_count{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo\",path!~\"healthz|readyz\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio sidecar", "refId": "A"}, {"expr": "sum(rate(http_request_duration_seconds_count{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\",path!~\"healthz|readyz\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient", "refId": "B"}], "title": "Business Request Rate by Mesh Type", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 8, "y": 7}, "id": 8, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "(1000 * histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo\",path!~\"healthz|readyz\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio sidecar", "refId": "A"}, {"expr": "(1000 * histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\",path!~\"healthz|readyz\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio ambient", "refId": "B"}], "title": "Business App P95 by Mesh Type", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 16, "y": 7}, "id": 9, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo\",destination_service_name!=\"PassthroughCluster\",destination_service!~\".*alloy.*\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio sidecar", "refId": "A"}, {"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\",destination_service_name!=\"PassthroughCluster\",destination_service!~\".*alloy.*\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient", "refId": "B"}], "title": "Mesh Request Rate Excluding Passthrough", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 0, "y": 15}, "id": 10, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "(histogram_quantile(0.95, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=\"source\",source_workload_namespace=\"podinfo\",destination_service_name!=\"PassthroughCluster\",destination_service!~\".*alloy.*\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio sidecar", "refId": "A"}, {"expr": "(histogram_quantile(0.95, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\",destination_service_name!=\"PassthroughCluster\",destination_service!~\".*alloy.*\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio ambient", "refId": "B"}], "title": "Mesh P95 Excluding Passthrough", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 8, "y": 15}, "id": 13, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(http_requests_total{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio sidecar raw", "refId": "A"}, {"expr": "sum(rate(http_requests_total{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "B"}], "title": "Raw App Request Rate Including Probes", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 2, "unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 16, "y": 15}, "id": 14, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio sidecar raw", "refId": "A"}, {"expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\"}[$__rate_interval])) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "B"}], "title": "Raw Mesh Request Rate Including Passthrough", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 0, "y": 23}, "id": 15, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "(1000 * histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio sidecar raw", "refId": "A"}, {"expr": "(1000 * histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\"prometheus.scrape.pods|podinfo/.+\",app=\"podinfo\",namespace=\"podinfo-ambient\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "B"}], "title": "Raw App P95 Including Probes", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "ms"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 8, "y": 23}, "id": 16, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "(histogram_quantile(0.95, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=\"source\",source_workload_namespace=\"podinfo\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio sidecar raw", "refId": "A"}, {"expr": "(histogram_quantile(0.95, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=\"source\",source_workload_namespace=\"podinfo-ambient\"}[$__rate_interval])))) or on() vector(0)", "legendFormat": "Istio ambient raw", "refId": "B"}], "title": "Raw Mesh P95 Including Passthrough", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 3, "unit": "cores"}, "overrides": []}, "gridPos": {"h": 8, "w": 8, "x": 16, "y": 23}, "id": 11, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"istio-system\",pod=~\"istiod-.*\",container=\"discovery\"}[$__rate_interval])) by (pod)", "legendFormat": "istiod {{pod}}", "refId": "A"}, {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"istio-system\",pod=~\"ztunnel-.*\",container=\"istio-proxy\"}[$__rate_interval])) by (pod)", "legendFormat": "ztunnel {{pod}}", "refId": "B"}], "title": "Istio Control Plane CPU", "type": "timeseries"},
        {"datasource": "Prometheus", "fieldConfig": {"defaults": {"decimals": 0, "unit": "MiB"}, "overrides": []}, "gridPos": {"h": 8, "w": 24, "x": 0, "y": 31}, "id": 12, "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}}, "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace=\"istio-system\",pod=~\"istiod-.*\",container=\"discovery\"}) by (pod) / 1024 / 1024", "legendFormat": "istiod {{pod}}", "refId": "A"}, {"expr": "sum(container_memory_working_set_bytes{namespace=\"istio-system\",pod=~\"ztunnel-.*\",container=\"istio-proxy\"}) by (pod) / 1024 / 1024", "legendFormat": "ztunnel {{pod}}", "refId": "B"}], "title": "Istio Control Plane Memory", "type": "timeseries"}
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "tags": ["ba2", "istio", "ambient", "sidecar", "telemetry", "overview"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
