name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint==1.35.1
      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, comments: disable, document-start: disable, indentation: {indent-sequences: consistent}}}" manifests/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -e SC1091 -e SC2086 scripts/*.sh

  validate-cff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cffconvert
        run: pip install cffconvert==2.0.0
      - name: Validate CITATION.cff
        run: cffconvert --validate
